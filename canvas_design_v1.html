<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thiết kế Ngày Quốc tế Thiếu nhi 1/6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            font-family: 'Baloo 2', cursive;
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            height: 100vh;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Glassmorphism card */
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            border: 2px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        /* Text gradient */
        .text-gradient {
            background: linear-gradient(45deg, #FF6B6B, #4ECDC4, #45B7D1);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: text-shine 3s linear infinite;
        }

        @keyframes text-shine {
            to { background-position: 200% center; }
        }

        /* Floating Animation */
        .floating {
            animation: float 4s ease-in-out infinite;
        }
        .floating-delay-1 {
            animation: float 5s ease-in-out infinite 1s;
        }
        .floating-delay-2 {
            animation: float 4.5s ease-in-out infinite 2s;
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        /* Cloud Background */
        .clouds {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: -1;
            background: url('https://cdn.pixabay.com/photo/2014/12/21/23/34/clouds-575510_960_720.png') repeat-x;
            background-size: contain;
            opacity: 0.3;
            animation: move-clouds 60s linear infinite;
        }

        @keyframes move-clouds {
            from { background-position: 0 0; }
            to { background-position: 100% 0; }
        }
    </style>
</head>
<body class="relative">

    <!-- Decorative background clouds -->
    <div class="clouds"></div>

    <!-- Decorative Emojis -->
    <div class="absolute top-10 left-10 text-6xl floating opacity-80">🎈</div>
    <div class="absolute top-20 right-20 text-6xl floating-delay-1 opacity-80">🧸</div>
    <div class="absolute bottom-20 left-32 text-6xl floating-delay-2 opacity-80">🎠</div>
    <div class="absolute bottom-10 right-32 text-6xl floating opacity-80">🍭</div>

    <!-- Main Card -->
    <div class="glass-card p-10 max-w-2xl w-full mx-4 text-center transform transition duration-500 hover:scale-105 relative z-10">
        <h1 class="text-5xl font-extrabold mb-4 text-gradient uppercase tracking-wide">
            Chúc Mừng Ngày Quốc Tế<br>Thiếu Nhi 1/6
        </h1>
        
        <p class="text-xl text-gray-700 mb-8 font-semibold">
            Chúc các bé luôn vui tươi, ngoan ngoãn, học thật giỏi, ăn thật nhiều và mỗi ngày đều là một ngày hạnh phúc nhé! ❤️
        </p>

        <!-- Gift Box Area -->
        <div id="gift-container" class="flex flex-col items-center justify-center">
            <button id="gift-btn" onclick="openGift()" class="text-8xl floating-delay-1 transition transform hover:scale-110 active:scale-95 cursor-pointer bg-transparent border-none outline-none">
                🎁
            </button>
            <p id="gift-instruction" class="mt-4 text-pink-500 font-bold text-lg animate-pulse">
                Click vào hộp quà để mở!
            </p>
        </div>
        
        <div id="surprise-message" class="hidden mt-6 bg-yellow-100 border-2 border-yellow-400 rounded-2xl p-4">
            <h2 class="text-2xl font-bold text-red-500">🎉 Bất ngờ chưa! 🎉</h2>
            <p class="text-lg text-gray-800 font-medium">Bé nhận được một phiếu bé ngoan và rất nhiều tình yêu thương!</p>
        </div>
    </div>

    <script>
        function openGift() {
            // Trigger Confetti
            var duration = 3000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#FF6B6B', '#4ECDC4', '#FFE66D']
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#FF6B6B', '#4ECDC4', '#FFE66D']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());

            // Change the gift icon to something else
            const giftBtn = document.getElementById('gift-btn');
            giftBtn.innerHTML = '🧸✨';
            giftBtn.classList.remove('floating-delay-1');
            giftBtn.onclick = null; // Disable clicking again
            giftBtn.style.cursor = 'default';

            // Hide instructions and show surprise message
            document.getElementById('gift-instruction').classList.add('hidden');
            const surpriseMessage = document.getElementById('surprise-message');
            surpriseMessage.classList.remove('hidden');
            surpriseMessage.classList.add('animate-bounce');
            setTimeout(() => surpriseMessage.classList.remove('animate-bounce'), 1000);
        }
    </script>
</body>
</html>
